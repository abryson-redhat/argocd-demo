apiVersion: v1
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.appName }}
  namespace:  {{ .Values.namespace }}
spec:
  project: {{ .Values.appProject }}
  destination:
    {{- with .Values.spec.destination }}
    namespace: {{ .namespace }}
    server: {{ .server }}
    {{- end }}
  {{ .Values.spec.source . }}
  {{ .Values.spec.syncPolicy . }}
