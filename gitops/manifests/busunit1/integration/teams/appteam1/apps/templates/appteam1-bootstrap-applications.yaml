apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{.Values.teamName}}-bootstrap-applications
  namespace: {{.Values.teamName}}-demo-{{.Values.environment}}
spec:
  generators:
    - git:
        repoURL: git@github.com:abryson-redhat/argocd-demo.git
        revision: argocd-demo
        # here it will read the paths under configs and the subpaths under the config paths
        #files:
        directories:
          - path: "gitops/manifests/{{.Values.busUnit}}/integration/teams/{{.Values.teamName}}/apps/*/configs/{{.Values.environment}}/*"
  template:
    metadata:
      teamName: "{{path[5]}}"
      namespace: "{{teamName}}-demo-{{path.basename}}"
      # you can use the path strings with / delimiter as variables
      name: "{{path[7]}}-{{path.basename}}"
    spec:
      project: default
      source:
        helm:
          # specify different values file based on directories variables
          valueFiles:
            - "{{path[7]}}/configs/{{path.basename}}/values.yaml"
        path: "gitops/manifests/{{.Values.busUnit}}/integration/teams/{{.Values.teamname}}/apps"
          #path: "{{path[7]}}"
        repoURL: git@github.com:abryson-redhat/argocd-demo.git
        targetRevision: argocd-demo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
      destination:
        # specify different destinations
        namespace: "{{.Values.teamName}}-demo-{{.Values.environment}}"
        server: https://kubernetes.default.svc
