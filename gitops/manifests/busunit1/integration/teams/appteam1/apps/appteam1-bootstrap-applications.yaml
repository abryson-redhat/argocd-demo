apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: appteam1-bootstrap-applications
  namespace: appteam1-demo-dev
spec:
  generators:
    - git:
        repoURL: git@github.com:abryson-redhat/argocd-demo.git
        revision: argocd-demo
        # here it will read the paths under configs and the subpaths under the config paths
        #files:
        directories:
          - path: "gitops/manifests/busunit1/integration/teams/appteam1/apps/*/configs/dev/*"
  template:
    metadata:
      namespace: appteam1-demo-dev
      # you can use the path strings with / delimiter as variables
      name: "{{path[7]}}-{{path.basename}}"
    spec:
      project: default
      source:
        helm:
          # specify different values file based on directories variables
          valueFiles:
            - "{{path[7]}}/configs/{{path.basename}}/values.yaml"
        path: gitops/manifests/busunit1/integration/teams/appteam1/apps
          #path: "{{path[7]}}"
        repoURL: git@github.com:abryson-redhat/argocd-demo.git
        targetRevision: argocd-demo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
      destination:
        # specify different destinations
        namespace: appteam1-demo-dev
        server: https://kubernetes.default.svc
